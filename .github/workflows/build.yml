name: Build Training Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ${{ steps.login-ecr.outputs.registry }}
  IMAGE_NAME: chest-ct-training

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
      
      - name: Build and push training image
        run: |
          echo "🔨 Building training image..."
          docker build -f Dockerfile.train -t ${{ env.IMAGE_NAME }} .
          
          echo "📦 Tagging image..."
          docker tag ${{ env.IMAGE_NAME }}:latest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          
          echo "⬆️ Pushing image to ECR..."
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          
          echo "✅ Image pushed successfully!"
          
      - name: Show image digest
        run: |
          echo "Image details:"
          aws ecr describe-images \
            --repository-name ${{ env.IMAGE_NAME }} \
            --query 'imageDetails[0].{Digest:imageDigest, Size:imageSizeInBytes, PushedAt:imagePushedAt}' \
            --output table